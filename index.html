<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מסע יציאת מצרים: אל החופש!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    height: 100%;
    width: 100%;
  }
  #gameWrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    image-rendering: pixelated;
    touch-action: none;
  }
  #mobileControls {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    pointer-events: none;
    z-index: 10;
  }
  .ctrlBtn {
    pointer-events: auto;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(40,30,20,0.55);
    border: 2px solid rgba(245,210,150,0.7);
    color: #f5d296;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }
  .ctrlGroup { display: flex; gap: 10px; }
  @media (min-width: 900px) {
    #mobileControls { display: none; }
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="680" height="420"></canvas>
</div>
<div id="mobileControls">
  <div class="ctrlGroup">
    <div class="ctrlBtn" id="btnRight">▶</div>
    <div class="ctrlBtn" id="btnLeft">◀</div>
  </div>
  <div class="ctrlGroup">
    <div class="ctrlBtn" id="btnJump">⤴</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = 680, H = 420;

  document.title = "מסע יציאת מצרים: אל החופש!";

  // ---------- עברית ----------
  // הערה: בניגוד ל-pygame, קנבס ה-HTML מציג עברית (RTL) נכון מאליו,
  // כל עוד הטקסט מועבר כמחרוזת Unicode רגילה. לכן אין צורך בהיפוך טקסט -
  // ופעולת היפוך כזו רק תקלקל את הכיוון הנכון.

  // ---------- מצב המשחק הגלובלי ----------
  let gameRunning = false;
  let showUiMsg = true;
  let msgText = "יציאת מצרים: מסע אל החופש!\nחצים כדי לזוז | רווח כדי לקפוץ\nברחו מצבא פרעה ואספו מצות לדרך!";
  let btnText = "בואו נתחיל!";

  let score = 0;
  let lives = 3;
  let level = 1;
  let invincible = 0;
  let cameraX = 0;
  const levelWidth = 2200;

  let bgPyramids = [];
  let platforms = [];
  let matzot = [];
  let soldiers = [];
  let particles = [];
  let player = {};
  let btnRect = { x: 0, y: 0, w: 0, h: 0 };

  function rand(a, b) { return a + Math.random() * (b - a); }

  function initLevel() {
    cameraX = 0;
    particles = [];

    player = {
      x: 80, y: 280, w: 34, h: 40,
      vx: 0, vy: 0, onGround: false,
      dir: 1, frame: 0, frameTimer: 0
    };

    bgPyramids = [];
    for (let i = 0; i < 15; i++) {
      bgPyramids.push({
        x: rand(0, levelWidth), y: 340,
        h: rand(80, 200), w: rand(120, 260),
        layer: Math.random() < 0.5 ? 0 : 1
      });
    }

    let matzahSpots;
    if (level === 1) {
      platforms = [
        { x: 0, y: 340, w: levelWidth, h: 80, type: "ground" },
        { x: 200, y: 270, w: 100, h: 16, type: "plat" },
        { x: 380, y: 230, w: 90, h: 16, type: "plat" },
        { x: 530, y: 195, w: 80, h: 16, type: "plat" },
        { x: 680, y: 260, w: 110, h: 16, type: "plat" },
        { x: 850, y: 220, w: 90, h: 16, type: "plat" },
        { x: 1020, y: 180, w: 100, h: 16, type: "plat" },
        { x: 1180, y: 240, w: 90, h: 16, type: "plat" },
        { x: 1340, y: 200, w: 80, h: 16, type: "plat" },
        { x: 1500, y: 260, w: 100, h: 16, type: "plat" },
        { x: 1660, y: 220, w: 90, h: 16, type: "plat" },
        { x: 1820, y: 180, w: 110, h: 16, type: "plat" },
        { x: 1980, y: 240, w: 120, h: 16, type: "plat" },
      ];
      matzahSpots = [
        { x: 240, y: 240 }, { x: 420, y: 200 }, { x: 565, y: 160 },
        { x: 710, y: 230 }, { x: 890, y: 190 }, { x: 1055, y: 145 },
        { x: 1220, y: 205 }, { x: 1375, y: 165 }, { x: 1535, y: 225 },
        { x: 1695, y: 185 }, { x: 1855, y: 145 }, { x: 2010, y: 205 },
        { x: 350, y: 310 }, { x: 600, y: 310 }, { x: 900, y: 310 },
        { x: 1150, y: 310 }, { x: 1450, y: 310 }, { x: 1750, y: 310 },
        { x: 2050, y: 310 }
      ];
    } else if (level === 2) {
      platforms = [
        { x: 0, y: 340, w: levelWidth, h: 80, type: "ground" },
        { x: 180, y: 250, w: 70, h: 16, type: "plat" },
        { x: 320, y: 180, w: 70, h: 16, type: "plat" },
        { x: 480, y: 260, w: 80, h: 16, type: "plat" },
        { x: 650, y: 200, w: 70, h: 16, type: "plat" },
        { x: 800, y: 150, w: 60, h: 16, type: "plat" },
        { x: 950, y: 230, w: 80, h: 16, type: "plat" },
        { x: 1100, y: 280, w: 70, h: 16, type: "plat" },
        { x: 1250, y: 200, w: 70, h: 16, type: "plat" },
        { x: 1400, y: 160, w: 60, h: 16, type: "plat" },
        { x: 1580, y: 240, w: 80, h: 16, type: "plat" },
        { x: 1750, y: 190, w: 70, h: 16, type: "plat" },
        { x: 1900, y: 250, w: 90, h: 16, type: "plat" },
      ];
      matzahSpots = [
        { x: 215, y: 210 }, { x: 355, y: 140 }, { x: 520, y: 220 },
        { x: 685, y: 160 }, { x: 830, y: 110 }, { x: 990, y: 190 },
        { x: 1135, y: 240 }, { x: 1285, y: 160 }, { x: 1430, y: 120 },
        { x: 1620, y: 200 }, { x: 1785, y: 150 }, { x: 1945, y: 210 },
        { x: 250, y: 310 }, { x: 550, y: 310 }, { x: 850, y: 310 },
        { x: 1150, y: 310 }, { x: 1450, y: 310 }, { x: 1750, y: 310 }
      ];
    } else {
      platforms = [
        { x: 0, y: 340, w: levelWidth, h: 80, type: "ground" },
        { x: 200, y: 280, w: 100, h: 16, type: "plat" },
        { x: 320, y: 220, w: 100, h: 16, type: "plat" },
        { x: 440, y: 160, w: 120, h: 16, type: "plat" },
        { x: 600, y: 240, w: 90, h: 16, type: "plat" },
        { x: 740, y: 280, w: 90, h: 16, type: "plat" },
        { x: 900, y: 220, w: 100, h: 16, type: "plat" },
        { x: 1040, y: 160, w: 100, h: 16, type: "plat" },
        { x: 1180, y: 110, w: 120, h: 16, type: "plat" },
        { x: 1350, y: 180, w: 90, h: 16, type: "plat" },
        { x: 1500, y: 240, w: 90, h: 16, type: "plat" },
        { x: 1650, y: 280, w: 100, h: 16, type: "plat" },
        { x: 1800, y: 220, w: 120, h: 16, type: "plat" },
        { x: 1950, y: 160, w: 100, h: 14, type: "plat" },
      ];
      matzahSpots = [
        { x: 250, y: 240 }, { x: 370, y: 180 }, { x: 500, y: 120 },
        { x: 645, y: 200 }, { x: 785, y: 240 }, { x: 950, y: 180 },
        { x: 1090, y: 120 }, { x: 1240, y: 70 }, { x: 1395, y: 140 },
        { x: 1545, y: 200 }, { x: 1700, y: 240 }, { x: 1860, y: 180 },
        { x: 2000, y: 120 }, { x: 400, y: 310 }, { x: 800, y: 310 },
        { x: 1200, y: 310 }, { x: 1600, y: 310 }
      ];
    }

    matzot = matzahSpots.map(s => ({ x: s.x, y: s.y, r: 12, collected: false, angle: rand(0, 5) }));

    soldiers = [];
    const soldierCount = Math.min(6 + level * 3, 12);

    // בוחרים פלטפורמות בפועל מתוך השלב הנוכחי (במקום קואורדינטות קשיחות
    // שלא תמיד מתאימות לכל שלב) - כך מובטח שהחיילים תמיד עומדים נכון.
    const groundPlat = platforms.find(p => p.type === "ground");
    const elevatedPlats = platforms.filter(p => p.type === "plat");

    // פיזור אחיד של נקודות על הקרקע (הרוב), בתוספת כמה פלטפורמות מורמות
    const spawnSpecs = [];
    const groundSpotCount = Math.ceil(soldierCount * 0.6);
    for (let i = 0; i < groundSpotCount; i++) {
      const t = (i + 1) / (groundSpotCount + 1);
      spawnSpecs.push({
        x: 300 + t * (levelWidth - 600),
        platform: groundPlat
      });
    }
    const elevatedNeeded = soldierCount - groundSpotCount;
    for (let i = 0; i < elevatedNeeded && elevatedPlats.length > 0; i++) {
      const p = elevatedPlats[i % elevatedPlats.length];
      spawnSpecs.push({
        x: p.x + p.w / 2,
        platform: p
      });
    }

    for (const spec of spawnSpecs) {
      const p = spec.platform;
      soldiers.push({
        x: spec.x, y: p.y - 32, w: 32, h: 32,
        vx: (Math.random() < 0.5 ? -1 : 1) * (1.2 + level * 0.4),
        alive: true, frame: 0, ft: 0
      });
    }
  }

  function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x: x, y: y,
        vx: rand(-3, 3), vy: rand(-4, -1),
        life: 1.0, color: color, r: rand(2, 5)
      });
    }
  }

  function showMsg(txt, btn) {
    msgText = txt;
    btnText = btn;
    showUiMsg = true;
    gameRunning = false;
  }

  function loseLife() {
    if (invincible > 0) return;
    lives -= 1;
    invincible = 90;
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, "rgb(210,100,50)", 16);
    player.vy = -8;
    if (lives <= 0) {
      showMsg(`אוי לא! צבא פרעה תפס אתכם!\nניקוד סופי: ${score}`, "נסו שוב");
      lives = 3;
      score = 0;
      level = 1;
      initLevel();
    }
  }

  // ---------- מצב מקשים ----------
  const keys = {};
  window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space"].includes(e.code)) e.preventDefault();
  });
  window.addEventListener("keyup", e => { keys[e.code] = false; });

  // ---------- כפתורי מובייל ----------
  let touchLeft = false, touchRight = false, touchJump = false;
  function bindHold(el, onDown, onUp) {
    el.addEventListener("touchstart", e => { e.preventDefault(); onDown(); }, { passive: false });
    el.addEventListener("touchend", e => { e.preventDefault(); onUp(); }, { passive: false });
    el.addEventListener("mousedown", e => { e.preventDefault(); onDown(); });
    el.addEventListener("mouseup", e => { e.preventDefault(); onUp(); });
    el.addEventListener("mouseleave", () => onUp());
  }
  bindHold(document.getElementById("btnLeft"), () => touchLeft = true, () => touchLeft = false);
  bindHold(document.getElementById("btnRight"), () => touchRight = true, () => touchRight = false);
  bindHold(document.getElementById("btnJump"), () => touchJump = true, () => touchJump = false);

  // ---------- קליק/מגע על הקנבס לכפתור ----------
  function getCanvasPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }

  function handleTap(x, y) {
    if (showUiMsg) {
      if (x >= btnRect.x && x <= btnRect.x + btnRect.w &&
          y >= btnRect.y && y <= btnRect.y + btnRect.h) {
        showUiMsg = false;
        gameRunning = true;
      }
    }
  }

  canvas.addEventListener("click", e => {
    const pos = getCanvasPos(e.clientX, e.clientY);
    handleTap(pos.x, pos.y);
  });
  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const t = e.touches[0];
    const pos = getCanvasPos(t.clientX, t.clientY);
    handleTap(pos.x, pos.y);
  }, { passive: false });

  // ---------- עדכון לוגיקת משחק ----------
  function update() {
    if (!gameRunning) return;

    if (invincible > 0) invincible -= 1;

    const speed = 4.5;
    const left = keys["ArrowLeft"] || keys["KeyA"] || touchLeft;
    const right = keys["ArrowRight"] || keys["KeyD"] || touchRight;
    const jumpKey = keys["ArrowUp"] || keys["KeyW"] || keys["Space"] || touchJump;

    if (left) {
      player.vx = -speed;
      player.dir = -1;
    } else if (right) {
      player.vx = speed;
      player.dir = 1;
    } else {
      player.vx *= 0.7;
    }

    if (jumpKey && player.onGround) {
      player.vy = -12;
      player.onGround = false;
      spawnParticles(player.x + player.w / 2, player.y + player.h, "rgb(240,220,160)", 6);
    }

    player.vy += 0.55;
    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;
    for (const p of platforms) {
      if (player.x + player.w > p.x && player.x < p.x + p.w &&
          player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy + 2 && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }

    if (player.x < 0) player.x = 0;
    if (player.y > H + 60) loseLife();

    if (player.onGround && Math.abs(player.vx) > 0.5) {
      player.frameTimer += 1;
      if (player.frameTimer > 6) {
        player.frame = (player.frame + 1) % 4;
        player.frameTimer = 0;
      }
    } else if (!player.onGround) {
      player.frame = 2;
    }

    cameraX = Math.max(0, Math.min(player.x - 260, levelWidth - W));

    let allCollected = true;
    for (const m of matzot) {
      if (!m.collected) {
        allCollected = false;
        m.angle += 0.04;
        if (Math.abs((player.x + player.w / 2) - m.x) < 22 && Math.abs((player.y + player.h / 2) - m.y) < 22) {
          m.collected = true;
          score += 10;
          spawnParticles(m.x, m.y, "rgb(225,195,140)", 12);
        }
      }
    }

    for (const r of soldiers) {
      if (!r.alive) continue;
      r.ft += 1;
      if (r.ft > 8) {
        r.frame = (r.frame + 1) % 2;
        r.ft = 0;
      }
      r.x += r.vx;

      let onP = false;
      for (const p of platforms) {
        if (r.x + r.w > p.x && r.x < p.x + p.w && r.y + r.h >= p.y && r.y + r.h <= p.y + 20) {
          onP = true;
        }
      }
      if (!onP || r.x < 10 || r.x > levelWidth - 40) {
        r.vx *= -1;
      }

      if (invincible === 0 &&
          player.x + player.w - 6 > r.x && player.x + 6 < r.x + r.w &&
          player.y + player.h - 4 > r.y && player.y + 4 < r.y + r.h) {
        if (player.vy > 2 && player.y + player.h < r.y + r.h * 0.6) {
          r.alive = false;
          score += 20;
          spawnParticles(r.x + r.w / 2, r.y, "rgb(120,90,70)", 14);
          player.vy = -8;
        } else {
          loseLife();
        }
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= 0.04;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (allCollected && matzot.length > 0) {
      level += 1;
      score += 50;
      if (level > 3) {
        showMsg(`הגעתם אל הארץ המובטחת!\nהובלתם את העם אל החופש!\nניקוד סופי: ${score}`, "שחקו שוב");
        level = 1;
        initLevel();
      } else {
        initLevel();
        showMsg(`תחנה ${level}\nהמסע ממשיך ברחבי המדבר!`, "המשך");
      }
    }
  }

  // ---------- ציור ----------
  function drawPyramid(p) {
    const cx = p.x - cameraX * (p.layer === 0 ? 0.2 : 0.4);
    if (cx < -p.w || cx > W + p.w) return;

    const colorLight = p.layer === 0 ? "rgb(225,185,110)" : "rgb(195,155,90)";
    const colorShadow = p.layer === 0 ? "rgb(190,150,85)" : "rgb(165,125,70)";

    const top = { x: cx, y: p.y - p.h };
    const bottomLeft = { x: cx - p.w / 2, y: p.y };
    const bottomCenter = { x: cx + p.w / 8, y: p.y };
    const bottomRight = { x: cx + p.w / 2, y: p.y };

    ctx.fillStyle = colorLight;
    ctx.beginPath();
    ctx.moveTo(top.x, top.y);
    ctx.lineTo(bottomLeft.x, bottomLeft.y);
    ctx.lineTo(bottomCenter.x, bottomCenter.y);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = colorShadow;
    ctx.beginPath();
    ctx.moveTo(top.x, top.y);
    ctx.lineTo(bottomCenter.x, bottomCenter.y);
    ctx.lineTo(bottomRight.x, bottomRight.y);
    ctx.closePath();
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawPlayer() {
    const pl = player;
    const sx = pl.x - cameraX, sy = pl.y;
    if (invincible > 0 && Math.floor(invincible / 5) % 2 === 1) return;

    ctx.save();
    const bx = sx - 10, by = sy - 10;
    const cx0 = bx + 10, cy0 = by + 10; // base offset matching python bx,by = 10,10 within sub-surface

    // translate so flips work around character center
    ctx.translate(sx + pl.w / 2, 0);
    if (pl.dir === -1) ctx.scale(-1, 1);
    ctx.translate(-pl.w / 2, 0);

    const ox = 0; // local x within this transformed space (0..pl.w)

    // body
    ctx.fillStyle = "rgb(230,240,255)";
    roundRect(ox + 4, sy + 12, pl.w - 8, pl.h - 16, 4);
    ctx.fill();
    // belt
    ctx.fillStyle = "rgb(80,130,190)";
    ctx.fillRect(ox + 2, sy + 14, 4, pl.h - 20);
    // head
    ctx.fillStyle = "rgb(240,190,150)";
    ctx.beginPath();
    ctx.arc(ox + pl.w / 2, sy + 8, 7, 0, Math.PI * 2);
    ctx.fill();
    // headscarf
    ctx.fillStyle = "rgb(200,190,170)";
    ctx.fillRect(ox + pl.w / 2 - 8, sy, 16, 6);
    // staff/beard triangle
    ctx.fillStyle = "rgb(100,100,100)";
    ctx.beginPath();
    ctx.moveTo(ox + pl.w / 2 - 4, sy + 11);
    ctx.lineTo(ox + pl.w / 2 + 4, sy + 11);
    ctx.lineTo(ox + pl.w / 2, sy + 18);
    ctx.closePath();
    ctx.fill();

    const legOffsets = [0, 3, 0, -3];
    const legOffset = legOffsets[pl.frame];
    ctx.fillStyle = "rgb(120,80,50)";
    ctx.fillRect(ox + 6, sy + pl.h - 4, 5, 6 + legOffset);
    ctx.fillRect(ox + pl.w - 11, sy + pl.h - 4, 5, 6 - legOffset);

    ctx.strokeStyle = "rgb(100,65,35)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ox + pl.w - 2, sy + 4);
    ctx.lineTo(ox + pl.w - 2, sy + pl.h - 2);
    ctx.stroke();

    ctx.restore();
  }

  function drawSoldier(r) {
    if (!r.alive) return;
    const sx = r.x - cameraX, sy = r.y;
    if (sx < -50 || sx > W + 50) return;

    ctx.fillStyle = "rgb(240,230,210)";
    roundRect(sx + 4, sy + 10, r.w - 8, r.h - 10, 4);
    ctx.fill();

    ctx.fillStyle = "rgb(220,160,40)";
    ctx.fillRect(sx + 4, sy + 10, r.w - 8, 6);

    ctx.fillStyle = "rgb(210,160,120)";
    ctx.beginPath();
    ctx.arc(sx + r.w / 2, sy + 6, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgb(30,60,140)";
    ctx.beginPath();
    ctx.moveTo(sx + r.w / 2, sy - 1);
    ctx.lineTo(sx, sy + 8);
    ctx.lineTo(sx + r.w, sy + 8);
    ctx.closePath();
    ctx.fill();

    const walk = r.frame * 4;
    ctx.fillStyle = "rgb(70,70,70)";
    ctx.fillRect(sx + 6, sy + r.h - 4, 6, 6 + walk);
    ctx.fillRect(sx + r.w - 12, sy + r.h - 4, 6, 6 - walk + 4);

    ctx.strokeStyle = "rgb(160,160,160)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx + 1, sy + 4);
    ctx.lineTo(sx + 1, sy + r.h);
    ctx.stroke();
  }

  function drawMatzah(m) {
    if (m.collected) return;
    const sx = m.x - cameraX;
    const sy = m.y + Math.sin(m.angle) * 4;
    if (sx < -20 || sx > W + 20) return;

    ctx.fillStyle = "rgb(225,195,145)";
    roundRect(sx - m.r, sy - m.r, m.r * 2, m.r * 2, 3);
    ctx.fill();
    ctx.strokeStyle = "rgb(185,150,100)";
    ctx.lineWidth = 2;
    roundRect(sx - m.r, sy - m.r, m.r * 2, m.r * 2, 3);
    ctx.stroke();

    ctx.fillStyle = "rgb(150,110,70)";
    const dots = [[-6, -6], [0, -6], [6, -6], [-6, 0], [0, 0], [6, 0], [-6, 6], [0, 6], [6, 6]];
    for (const [dx, dy] of dots) {
      ctx.beginPath();
      ctx.arc(sx + dx, sy + dy, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawBadge(text, x, font, align) {
    ctx.font = font;
    const textW = ctx.measureText(text).width;
    const boxW = textW + 20;
    const boxH = 28;
    let boxX;
    if (align === "right") boxX = x - boxW;
    else if (align === "center") boxX = x - boxW / 2;
    else boxX = x;

    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(boxX, 10, boxW, boxH, 4);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, boxX + boxW / 2, 10 + boxH / 2 + 1);
  }

  function drawUi() {
    const font = "bold 16px Arial, sans-serif";

    drawBadge(`מצות: ${score}`, W - 14, font, "right");
    drawBadge(`פסילות: ${lives}`, W / 2, font, "center");
    drawBadge(`תחנה ${level}`, 14, font, "left");
  }

  function drawMsgBox() {
    if (!showUiMsg) return;

    const boxW = 380, boxH = 200;
    const boxX = W / 2 - boxW / 2;
    const boxY = H / 2 - boxH / 2;

    ctx.fillStyle = "rgba(40,30,20,0.88)";
    roundRect(boxX, boxY, boxW, boxH, 12);
    ctx.fill();

    const lines = msgText.split("\n");
    let currY = boxY + 20;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    for (let i = 0; i < lines.length; i++) {
      const isTitle = i === 0;
      ctx.font = isTitle ? "bold 24px Arial, sans-serif" : "bold 16px Arial, sans-serif";
      ctx.fillStyle = isTitle ? "rgb(245,210,150)" : "#fff";
      ctx.fillText(lines[i], W / 2, currY);
      currY += 30;
    }

    btnRect = { x: W / 2 - 65, y: boxY + boxH - 45, w: 130, h: 32 };
    ctx.strokeStyle = "rgb(245,210,150)";
    ctx.lineWidth = 2;
    roundRect(btnRect.x, btnRect.y, btnRect.w, btnRect.h, 6);
    ctx.stroke();

    ctx.font = "bold 16px Arial, sans-serif";
    ctx.fillStyle = "rgb(245,210,150)";
    ctx.textBaseline = "middle";
    ctx.fillText(btnText, W / 2, btnRect.y + btnRect.h / 2 + 1);
  }

  function draw() {
    // שמיים בגרדיאנט
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "rgb(140,190,230)");
    grad.addColorStop(1, "rgb(235,190,120)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const sortedPyramids = [...bgPyramids].sort((a, b) => a.layer - b.layer);
    for (const p of sortedPyramids) drawPyramid(p);

    for (const p of platforms) {
      const sx = p.x - cameraX;
      if (sx > W + 20 || sx + p.w < -20) continue;
      if (p.type === "ground") {
        ctx.fillStyle = "rgb(210,160,90)";
        ctx.fillRect(sx, p.y, p.w, p.h);
        ctx.fillStyle = "rgb(235,195,120)";
        ctx.fillRect(sx, p.y, p.w, 6);
      } else {
        ctx.fillStyle = "rgb(170,125,75)";
        roundRect(sx, p.y, p.w, p.h, 4);
        ctx.fill();
        ctx.fillStyle = "rgb(200,155,95)";
        roundRect(sx, p.y, p.w, 4, 4);
        ctx.fill();
        ctx.strokeStyle = "rgb(130,95,55)";
        ctx.lineWidth = 1;
        for (let bxOff = 15; bxOff < p.w; bxOff += 25) {
          ctx.beginPath();
          ctx.moveTo(sx + bxOff, p.y);
          ctx.lineTo(sx + bxOff, p.y + p.h);
          ctx.stroke();
        }
      }
    }

    for (const m of matzot) drawMatzah(m);
    for (const r of soldiers) drawSoldier(r);
    drawPlayer();

    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x - cameraX, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    drawUi();
    drawMsgBox();
  }

  // ---------- לופ המשחק ----------
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  initLevel();
  requestAnimationFrame(loop);
})();
</script>
</body>
